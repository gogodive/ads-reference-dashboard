<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>경쟁사 광고 모니터링</title>
<style>
:root{
  --surface:#fcfcfb; --page:#f9f9f7; --ink:#0b0b0b; --ink-2:#52514e; --muted:#898781;
  --grid:#e1e0d9; --axis:#c3c2b7; --ring:rgba(11,11,11,.10);
  --blue:#2a78d6; --aqua:#1baf7a; --yellow:#eda100; --green:#008300; --red:#e34948;
  --good:#006300;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:var(--page);color:var(--ink);font-size:14px;line-height:1.5}
a{color:var(--blue);text-decoration:none}
.layout{display:flex;min-height:100vh}
/* ── 사이드바 ── */
.sidebar{width:230px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--grid);padding:16px 10px;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar h1{font-size:15px;padding:2px 8px 12px;display:flex;align-items:center;gap:6px}
.sidebar .sub{font-size:11px;color:var(--muted);padding:0 8px 14px}
.brand-item{display:flex;align-items:center;gap:8px;width:100%;text-align:left;border:0;background:none;font:inherit;padding:9px 8px;border-radius:8px;cursor:pointer;color:var(--ink-2)}
.brand-item:hover{background:var(--page)}
.brand-item.on{background:#eef4fc;color:var(--ink);font-weight:600}
.brand-item .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sec-label{font-size:11px;font-weight:700;color:var(--muted);padding:14px 8px 6px;letter-spacing:.02em}
.badge-new{font-size:11px;font-weight:700;color:var(--good)}
.brand-item .cnt{font-size:11px;color:var(--muted)}
/* ── 메인 ── */
.main{flex:1;min-width:0;padding:22px 26px}
.header{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:4px}
.header h2{font-size:20px}
.header .meta{font-size:12px;color:var(--muted)}
.chips{display:flex;gap:14px;flex-wrap:wrap;margin:8px 0 16px;font-size:12.5px;color:var(--ink-2)}
.chips b{color:var(--ink)}
.chips .sw{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:baseline}
/* 탭 */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--grid);margin-bottom:18px}
.tab{border:0;background:none;font:inherit;font-size:13.5px;padding:9px 14px;cursor:pointer;color:var(--ink-2);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.on{color:var(--ink);font-weight:600;border-bottom-color:var(--blue)}
/* 필터 행 */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.filter{border:1px solid var(--grid);background:var(--surface);font:inherit;font-size:12px;padding:4px 11px;border-radius:99px;cursor:pointer;color:var(--ink-2)}
.filter.on{background:var(--ink);color:#fff;border-color:var(--ink)}
/* ── 카드 그리드 ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(235px,1fr));gap:14px}
.card{background:var(--surface);border:1px solid var(--ring);border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
.thumb{position:relative;aspect-ratio:1/1.05;background:linear-gradient(145deg,#eef1f5,#e2e6ec);display:flex;align-items:center;justify-content:center}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb .ph{font-size:26px;opacity:.45}
.tagline{position:absolute;top:8px;left:8px;right:8px;display:flex;justify-content:space-between;pointer-events:none}
.dur{font-size:10.5px;font-weight:600;background:rgba(11,11,11,.72);color:#fff;padding:2.5px 7px;border-radius:5px}
.dead{font-size:10.5px;font-weight:600;background:rgba(208,59,59,.9);color:#fff;padding:2.5px 7px;border-radius:5px}
.card .bd{padding:10px 11px 11px;display:flex;flex-direction:column;gap:7px;flex:1}
.tagchips{display:flex;gap:5px;flex-wrap:wrap}
.tg{font-size:10.5px;padding:2px 7px;border-radius:5px;background:var(--page);border:1px solid var(--grid);color:var(--ink-2)}
.tg.fmt{font-weight:600}
.copy{font-size:12px;color:var(--ink-2);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.ft{margin-top:auto}
.ft .dt{font-size:11px;color:var(--muted);margin-bottom:5px}
.ft .acts{display:flex;gap:5px;flex-wrap:wrap}
.act{border:1px solid var(--grid);background:var(--surface);font:inherit;font-size:10.5px;color:var(--ink-2);padding:2.5px 8px;border-radius:6px;text-decoration:none;cursor:pointer;line-height:1.35;white-space:nowrap}
.act:hover{background:var(--page);color:var(--ink)}
.mini .ft{padding-top:6px}
.mini .act{font-size:10px;padding:2px 6px}
.anal{font-size:11.5px;color:var(--ink-2);background:var(--page);border-radius:7px;padding:7px 8px;display:none}
.card.open .anal{display:block}
.morebtn{border:0;background:none;font:inherit;font-size:11px;color:var(--blue);cursor:pointer;padding:0}
.thumb a{display:block;width:100%;height:100%}
/* ── 히스토리 ── */
.day{background:var(--surface);border:1px solid var(--ring);border-radius:12px;padding:16px 18px;margin-bottom:14px}
.day h3{font-size:14.5px;margin-bottom:2px}
.day .dsub{font-size:11.5px;color:var(--muted);margin-bottom:12px}
.hgroup{margin-top:10px}
.hgroup h4{font-size:12.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:99px;display:inline-block}
.minis{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.mini{border:1px solid var(--grid);border-radius:9px;overflow:hidden;background:var(--surface)}
.mini .mth{position:relative;aspect-ratio:1/1;background:linear-gradient(145deg,#eef1f5,#e2e6ec);display:flex;align-items:center;justify-content:center}
.mini img{width:100%;height:100%;object-fit:cover;display:block}
.mini .mbd{padding:7px 8px;font-size:11px;color:var(--ink-2)}
.mini .mbd .t{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.empty{font-size:12px;color:var(--muted)}
/* ── 위닝 광고 ── */
.rankwrap{position:relative}
.rank{position:absolute;top:-7px;left:-7px;z-index:2;width:22px;height:22px;border-radius:99px;background:var(--ink);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.25)}
.rank.gold{background:#c9950c}
.st{font-size:10.5px;font-weight:700;padding:2.5px 8px;border-radius:5px}
.st.win{background:#e3f4e3;color:var(--good)}
.st.test{background:#e8f0fb;color:var(--blue)}
.st.lose{background:#fbe9e9;color:#b33}
.gcard{background:var(--surface);border:1px solid var(--ring);border-radius:12px;padding:15px 17px;margin-bottom:13px}
.gcard h4{font-size:13.5px;margin-bottom:2px}
.gcard .gsub{font-size:11.5px;color:var(--muted);margin-bottom:11px}
/* ── 대시보드 ── */
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:16px}
.tile{background:var(--surface);border:1px solid var(--ring);border-radius:12px;padding:14px 16px}
.tile .lb{font-size:12px;color:var(--ink-2)}
.tile .v{font-size:26px;font-weight:700;margin-top:2px}
.tile .sb{font-size:11px;color:var(--muted);margin-top:2px}
.tile .delta{font-size:12px;font-weight:600;margin-left:6px}
.panel-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:14px}
.panel{background:var(--surface);border:1px solid var(--ring);border-radius:12px;padding:16px 18px;min-width:0}
.panel h4{font-size:13.5px;margin-bottom:12px}
.legend{display:flex;gap:12px;flex-wrap:wrap;font-size:11.5px;color:var(--ink-2);margin-bottom:8px}
.legend .it{display:flex;align-items:center;gap:5px}
.legend .sw{width:9px;height:9px;border-radius:2px}
svg text{font-family:inherit;font-variant-numeric:tabular-nums}
.tooltip{position:fixed;pointer-events:none;background:var(--ink);color:#fff;font-size:11.5px;padding:6px 9px;border-radius:7px;z-index:50;display:none;white-space:nowrap;line-height:1.55}
.tooltip .tt-d{opacity:.7}
@media (max-width:760px){
  .layout{flex-direction:column}
  .sidebar{position:static;width:100%;height:auto;border-right:0;border-bottom:1px solid var(--grid);padding:10px 12px 8px}
  .sidebar h1{font-size:14px;padding:0 0 8px}
  .sidebar .sub{display:none}
  #brandlist{display:flex;align-items:center;gap:6px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch}
  .sec-label{flex-shrink:0;padding:0 2px 0 6px;white-space:nowrap}
  .brand-item{flex-shrink:0;width:auto;border:1px solid var(--grid);border-radius:99px;padding:6px 12px;white-space:nowrap}
  .brand-item.on{border-color:var(--blue)}
  .main{padding:14px}
  .tabs{overflow-x:auto}
  .tab{white-space:nowrap;padding:9px 10px}
  .grid{grid-template-columns:repeat(2,1fr);gap:9px}
  .card .bd{padding:8px 9px 9px;gap:5px}
  .copy{font-size:11px}
  .tg{font-size:9.5px;padding:1.5px 5px}
  .act{font-size:10px;padding:2px 6px}
  .ft .dt{font-size:10px}
  .dur,.dead{font-size:9.5px;padding:2px 5px}
}
</style>
</head>

    <div id="brandlist"></div>
  </nav>
  <main class="main" id="main"></main>
</div>

function renderSidebar(){

}

/* ── 공용: 필터 바 + 카드 이벤트 바인딩 ── */
function passFilter(a){
  return (fmtFilter==="전체"||a.format===fmtFilter) &&
         (stFilter==="전체" || (stFilter==="게재중")===a.active);
}
function filterBarHtml(b){
  const fmts = ["전체", ...FMTS.filter(f=> b.ads.some(a=>a.format===f))];
  const sts = ["전체","게재중","종료"];
  return `<div class="filters">
    ${fmts.map(f=>`<button class="filter ${fmtFilter===f?'on':''}" data-f="${f}">${f}</button>`).join("")}
    <span style="width:10px"></span>
    ${sts.map(s=>`<button class="filter ${stFilter===s?'on':''}" data-s="${s}">${s}</button>`).join("")}
  </div>`;
}
function bindFilterBar(){
  $("#tabbody").querySelectorAll(".filter[data-f]").forEach(el=> el.onclick=()=>{ fmtFilter=el.dataset.f; renderAll(); });
  $("#tabbody").querySelectorAll(".filter[data-s]").forEach(el=> el.onclick=()=>{ stFilter=el.dataset.s; renderAll(); });
}
function bindCards(){
  $("#tabbody").querySelectorAll(".morebtn").forEach(el=> el.onclick=()=> el.closest(".card").classList.toggle("open"));
  bindCopyBtns();
}

/* ── 탭1: 수집된 광고 ── */
function adCard(a, mini, chip){
  const img = a.thumb || a.preview_url || (a.format==="영상" ? "" : a.media_url);
  const orig = a.media_url || a.snapshot_url;           // 원본 소재(이미지/영상 파일) 우선
  const thumbInner = img ? `<img src="${esc(img)}" loading="lazy" onerror="this.outerHTML='<div class=ph>🖼️</div>'">`
                         : `<div class="ph">${a.format==="영상"?"🎬":"🖼️"}</div>`;
  const thumb = orig ? `<a href="${esc(orig)}" target="_blank" title="원본 소재 열기">${thumbInner}</a>` : thumbInner;
  const durTxt = a.active ? `${a.duration}일째 게재중` : `${a.duration}일간 게재`;
  const ftHtml = `<div class="ft"><div class="dt">${esc(a.start_date||a.first_seen||"")} 시작</div>
      <div class="acts">
      ${a.media_url? `<a class="act" href="${esc(a.media_url)}" target="_blank" title="원본 소재 열기">원본↗</a><button class="act copybtn" data-url="${esc(a.media_url)}" title="원본 URL 복사">복사</button>`:""}
      ${a.snapshot_url? `<a class="act" href="${esc(a.snapshot_url)}" target="_blank" title="Ad Library 에서 보기">라이브러리↗</a>`:""}</div></div>`;
  if(mini) return `<div class="mini"><div class="mth">${thumb}
      <div class="tagline"><span class="dur">${durTxt}</span>${a.active?"":'<span class="dead">종료</span>'}</div></div>
      <div class="mbd">${chip||""}<div class="t">${esc(a.body||a.title)}</div>${ftHtml}</div></div>`;
  return `<div class="card" data-k="${esc(a.key)}">
    <div class="thumb">${thumb}
      <div class="tagline"><span class="dur">${durTxt}</span>${a.active?"":'<span class="dead">게재 종료</span>'}</div></div>
    <div class="bd">
      <div class="tagchips">
        ${chip||""}
        <span class="tg fmt" style="border-color:${FC[a.format]};color:${FC[a.format]}">${a.format}</span>
        ${a.hook? `<span class="tg">🪝 ${esc(a.hook)}</span>`:""}
        ${a.offer && a.offer!=="없음" ? `<span class="tg">🎁 ${esc(a.offer)}</span>`:""}
        ${a.platforms.map(p=>`<span class="tg">${esc(p)}</span>`).join("")}
      </div>
      <div class="copy">${esc(a.body||a.title)}</div>
      ${a.analysis? `<button class="morebtn">분석 보기 ▾</button><div class="anal">${esc(a.analysis)}${a.visual? "<br><span style='color:var(--muted)'>비주얼: "+esc(a.visual)+"</span>":""}</div>`:""}
      ${ftHtml}
    </div></div>`;
}
function bindCopyBtns(){
  document.querySelectorAll(".copybtn").forEach(el=> el.onclick = ()=>{
    navigator.clipboard.writeText(el.dataset.url).then(()=>{
      const t = el.textContent; el.textContent = "✅ 복사됨";
      setTimeout(()=>{ el.textContent = t; }, 1200);
    });
  });
}
function renderAds(b){

  bindFilterBar(); bindCards();
}

/* ── 탭2: 게재 히스토리 ── */
function renderHist(b){
  const byKey = {}; b.ads.forEach(a=> byKey[a.key]=a);
  const days = [...b.series].reverse();
  $("#tabbody").innerHTML = filterBarHtml(b) + (days.map(d=>{
    const started = (d.started||[]).map(k=>byKey[k]).filter(Boolean).filter(passFilter);
    const stopped = (d.stopped||[]).map(k=>byKey[k]).filter(Boolean).filter(passFilter);
    return `<div class="day">
      <h3>${dLabel(d.date)}</h3>
      <div class="dsub">${num(d.active)}개 게재 중${d.truncated? " · 수집 잘림(중단 판정 보류)":""}</div>
      <div class="hgroup"><h4><span class="dot" style="background:var(--aqua)"></span>게재 시작된 광고 <b>${started.length}</b>개</h4>
        ${started.length? `<div class="grid">${started.map(a=>adCard(a)).join("")}</div>` : '<p class="empty">없음</p>'}</div>
      <div class="hgroup"><h4><span class="dot" style="background:var(--red)"></span>게재 중단된 광고 <b>${stopped.length}</b>개</h4>
        ${stopped.length? `<div class="grid">${stopped.map(a=>adCard(a)).join("")}</div>` : '<p class="empty">없음</p>'}</div>
    </div>`;
  }).join("") || '<p class="empty">히스토리가 아직 없습니다. 매일 수집이 쌓이면 표시됩니다.</p>');
  bindFilterBar(); bindCards();
}

/* ── 탭3: 위닝 광고 ── */
function renderWin(b){
  const byKey = {}; b.ads.forEach(a=> byKey[a.key]=a);
  // 게재 기간 랭킹 (게재중 우선, 기간 내림차순) TOP 8 — 필터 적용
  const ranked = b.ads.filter(passFilter)
    .sort((x,y)=> (y.active-x.active) || (y.duration-x.duration)).slice(0,8);
  const stChip = s => s==="위닝"? '<span class="st win">🏆 위닝</span>'
                    : s==="검증 중"? '<span class="st test">검증 중</span>'
                    : '<span class="st lose">미선정</span>';
  const groupsHtml = (b.groups||[]).map(g=>{
    const members = g.keys.map(k=>byKey[k]).filter(Boolean);
    if(!members.length || !members.some(passFilter)) return "";   // 그룹은 세트 유지, 필터는 노출 여부만
    return `<div class="gcard">
      <h4>${dLabel(g.date)} 시작 · A/B 테스트 그룹</h4>
      <div class="gsub">같은 날 시작된 유사 소재 ${members.length}개 변형 — 오래 살아남은 변형이 위닝</div>
      <div class="grid">${members.map(a=> adCard(a,false, stChip(g.status[a.key]))).join("")}</div>
    </div>`;
  }).join("");
  $("#tabbody").innerHTML = filterBarHtml(b) + `
    <div class="gcard">
      <h4>🏆 게재 기간 랭킹 TOP ${ranked.length}</h4>
      <div class="gsub">성과 수치는 비공개지만, 오래 돌아가는 광고 = 돈이 되는 소재. 게재 기간이 가장 긴 순서입니다.</div>
      <div class="grid">${ranked.map((a,i)=>
        `<div class="rankwrap"><span class="rank ${i<3?'gold':''}">${i+1}</span>${adCard(a)}</div>`).join("") || '<p class="empty">데이터 없음</p>'}</div>
    </div>
    ${groupsHtml || '<p class="empty">A/B 테스트 그룹이 아직 없습니다 — 같은 날 시작된 유사 카피 소재가 수집되면 자동으로 묶입니다.</p>'}`;
  bindFilterBar(); bindCards();
}

/* ── 탭4: 분석 대시보드 ── */
const tip = $("#tip");
function showTip(html,x,y){ tip.innerHTML=html; tip.style.display="block";
  const w=tip.offsetWidth; tip.style.left=Math.min(x+14, innerWidth-w-10)+"px"; tip.style.top=(y+14)+"px"; }
function hideTip(){ tip.style.display="none"; }

function donutSVG(counts, total){
  const R=74, r=46, cx=95, cy=95;
  let a0=-Math.PI/2, parts="";
  FMTS.forEach(f=>{
    const v=counts[f]||0; if(!v) return;
    const frac=v/total, a1=a0+frac*2*Math.PI;
    const large=frac>.5?1:0;
    const p=(a,rad)=>`${cx+rad*Math.cos(a)},${cy+rad*Math.sin(a)}`;
    parts+=`<path d="M${p(a0,R)} A${R},${R} 0 ${large} 1 ${p(a1,R)} L${p(a1,r)} A${r},${r} 0 ${large} 0 ${p(a0,r)} Z"
      fill="${FC[f]}" stroke="var(--surface)" stroke-width="2" data-f="${f}" data-v="${v}"/>`;
    a0=a1;
  });
  return `<svg viewBox="0 0 190 190" width="190" height="190">${parts}
    <text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="24" font-weight="700" fill="var(--ink)">${num(total)}</text>
    <text x="${cx}" y="${cy+16}" text-anchor="middle" font-size="10.5" fill="var(--muted)">게재 중</text></svg>`;
}

function lineFrame(W,H,PL,PT,PR,PB,maxY){
  const ih=H-PT-PB;
  const ticks=4, out=[];
  for(let i=0;i<=ticks;i++){
    const v=Math.round(maxY*i/ticks), y=PT+ih-(ih*i/ticks);
    out.push(`<line x1="${PL}" x2="${W-PR}" y1="${y}" y2="${y}" stroke="var(--grid)" stroke-width="1"/>
      <text x="${PL-7}" y="${y+3.5}" text-anchor="end" font-size="10" fill="var(--muted)">${num(v)}</text>`);
  }
  return out.join("");
}

function seriesChart(id, seriesList, dates, opts){
  // seriesList: [{name,color,values:[...]}]  단일/멀티 공용 라인차트
  const W=520,H=200,PL=38,PT=10,PR=12,PB=24, iw=W-PL-PR, ih=H-PT-PB;
  const maxY=Math.max(1,...seriesList.flatMap(s=>s.values))*1.15;
  const X=i=> dates.length<2? PL+iw/2 : PL+iw*i/(dates.length-1);
  const Y=v=> PT+ih-ih*(v/maxY);
  let g=lineFrame(W,H,PL,PT,PR,PB,maxY);
  const step=Math.max(1,Math.ceil(dates.length/7));
  dates.forEach((d,i)=>{ if(i%step===0||i===dates.length-1)
    g+=`<text x="${X(i)}" y="${H-8}" text-anchor="middle" font-size="10" fill="var(--muted)">${dShort(d)}</text>`; });
  seriesList.forEach(s=>{
    const pts=s.values.map((v,i)=>`${X(i)},${Y(v)}`).join(" ");
    g+= dates.length===1
      ? `<circle cx="${X(0)}" cy="${Y(s.values[0])}" r="4" fill="${s.color}"/>`
      : `<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linejoin="round"/>`;
    const li=s.values.length-1;
    if(li>=0 && seriesList.length<=4){
      const lx=X(li), flip = lx > W-30;   // 오른쪽 끝이면 점 왼쪽에 라벨 (잘림 방지)
      g+=`<text x="${flip? lx-6 : lx+5}" y="${Y(s.values[li])-5}" text-anchor="${flip?'end':'start'}" font-size="10" fill="${s.color}" font-weight="600">${s.values[li]}</text>`;
    }
  });
  g+=`<line id="${id}-cross" x1="0" x2="0" y1="${PT}" y2="${PT+ih}" stroke="var(--axis)" stroke-width="1" style="display:none"/>
      <rect x="${PL}" y="${PT}" width="${iw}" height="${ih}" fill="transparent" id="${id}-hit"/>`;
  const svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto" id="${id}">${g}</svg>`;
  setTimeout(()=>{
    const el=$( "#"+id ), hit=$("#"+id+"-hit"), cross=$("#"+id+"-cross");
    if(!el) return;
    hit.addEventListener("mousemove", ev=>{
      const box=el.getBoundingClientRect(), sx=W/box.width;
      const px=(ev.clientX-box.left)*sx;
      const i=Math.max(0,Math.min(dates.length-1, Math.round((px-PL)/(iw/Math.max(1,dates.length-1)))));
      cross.setAttribute("x1",X(i)); cross.setAttribute("x2",X(i)); cross.style.display="block";
      let html=`<span class="tt-d">${dLabel(dates[i])}</span>`;
      seriesList.forEach(s=>{
        const v=s.values[i], pv=i>0? s.values[i-1] : null;
        const dl = pv!==null && pv>0 ? ` <span style="color:${v>=pv?'#7be07b':'#ff9d9d'}">${v>=pv?"+":""}${Math.round((v-pv)/pv*100)}%</span>` : "";
        html+=`<br><span class="sw" style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${s.color};margin-right:5px"></span>${esc(s.name)} <b>${num(v)}</b>${seriesList.length===1? "개":""}${dl}`;
      });
      showTip(html, ev.clientX, ev.clientY);
    });
    hit.addEventListener("mouseleave", ()=>{ cross.style.display="none"; hideTip(); });
  },0);
  return svg;
}

function barChart(id, labels, values){
  const W=520,H=190,PL=38,PT=10,PR=12,PB=24, iw=W-PL-PR, ih=H-PT-PB;
  const maxY=Math.max(1,...values)*1.15;
  const bw=Math.min(46, iw/labels.length*0.62);
  let g=lineFrame(W,H,PL,PT,PR,PB,maxY);
  labels.forEach((lb,i)=>{
    const x=PL+iw*(i+0.5)/labels.length - bw/2, h=ih*(values[i]/maxY), y=PT+ih-h;
    g+=`<path d="M${x},${PT+ih} V${y+4} Q${x},${y} ${x+4},${y} H${x+bw-4} Q${x+bw},${y} ${x+bw},${y+4} V${PT+ih} Z"
        fill="var(--blue)" data-i="${i}" class="bar-${id}" style="cursor:default"/>
      <text x="${x+bw/2}" y="${H-8}" text-anchor="middle" font-size="10" fill="var(--muted)">${lb}</text>`;
  });
  const svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto" id="${id}">${g}</svg>`;
  setTimeout(()=>{
    document.querySelectorAll(".bar-"+id).forEach(el=>{
      el.addEventListener("mousemove", ev=>{
        const i=+el.dataset.i;
        showTip(`${labels[i]} <b>${num(values[i])}</b>개`, ev.clientX, ev.clientY);
      });
      el.addEventListener("mouseleave", hideTip);
    });
  },0);
  return svg;
}

function renderDash(b){
  const dates=b.series.map(s=>s.date);
  const last=b.series[b.series.length-1], prev=b.series[b.series.length-2];
  const delta = last&&prev&&prev.active>0 ? Math.round((last.active-prev.active)/prev.active*100) : null;
  const cnt={}; b.ads.forEach(a=>{ if(a.active) cnt[a.format]=(cnt[a.format]||0)+1; });
  const activeTotal=b.active_count||0;
  // 게재 기간 분포 버킷
  const buckets=[["1~3일",1,3],["4~7일",4,7],["8~14일",8,14],["15~30일",15,30],["31일+",31,1e9]];
  const bvals=buckets.map(([,lo,hi])=> b.ads.filter(a=>a.duration>=lo&&a.duration<=hi).length);
  const legendHtml = f => `<span class="it"><span class="sw" style="background:${FC[f]}"></span>${f} <b>${activeTotal? Math.round((cnt[f]||0)/activeTotal*100):0}%</b> (${cnt[f]||0})</span>`;
  $("#tabbody").innerHTML = `
    <div class="tiles">
      <div class="tile"><div class="lb">게재 중인 광고</div><div class="v">${num(activeTotal)}개${delta!==null? `<span class="delta" style="color:${delta>=0?'var(--good)':'var(--red)'}">${delta>=0?"+":""}${delta}%</span>`:""}</div><div class="sb">${last? "기준 "+last.date : ""}</div></div>
      <div class="tile"><div class="lb">수집된 광고</div><div class="v">${num(b.total_count)}개</div><div class="sb">${b.since? b.since+" 부터 수집됨":""}</div></div>
      <div class="tile"><div class="lb">오늘 게재 시작</div><div class="v">${num(last? (last.started||[]).length:0)}개</div><div class="sb">${last? last.date:""}</div></div>
      <div class="tile"><div class="lb">오늘 게재 중단</div><div class="v">${num(last? (last.stopped||[]).length:0)}개</div><div class="sb">${last&&last.truncated? "수집 잘림 — 판정 보류":""}</div></div>
    </div>
    <div class="panel-grid">
      <div class="panel"><h4>미디어 유형별 분포 <span style="color:var(--muted);font-weight:400">(게재 중)</span></h4>
        <div style="display:flex;gap:18px;align-items:center;flex-wrap:wrap">
          <div id="donut">${activeTotal? donutSVG(cnt,activeTotal): '<p class="empty">게재 중 광고 없음</p>'}</div>
          <div class="legend" style="flex-direction:column;align-items:flex-start;gap:7px">
            ${FMTS.filter(f=>cnt[f]).map(legendHtml).join("")}</div></div></div>
      <div class="panel"><h4>게재 광고 수 추이</h4>
        ${dates.length? seriesChart("trend",[{name:"게재 광고",color:"var(--blue)",values:b.series.map(s=>s.active)}],dates):'<p class="empty">데이터 없음</p>'}</div>
      <div class="panel"><h4>게재 광고 수 추이 — 미디어 유형별</h4>
        <div class="legend">${FMTS.filter(f=> b.series.some(s=>(s.by_format||{})[f])).map(f=>`<span class="it"><span class="sw" style="background:${FC[f]}"></span>${f}</span>`).join("")}</div>
        ${dates.length? seriesChart("trendf", FMTS.filter(f=> b.series.some(s=>(s.by_format||{})[f])).map(f=>({name:f,color:FC[f],values:b.series.map(s=>(s.by_format||{})[f]||0)})), dates):'<p class="empty">데이터 없음</p>'}</div>
      <div class="panel"><h4>광고 게재 기간 분포 <span style="color:var(--muted);font-weight:400">(전체 수집분)</span></h4>
        ${barChart("durs", buckets.map(x=>x[0]), bvals)}</div>
    </div>`;
  // 도넛 툴팁
  setTimeout(()=>{
    document.querySelectorAll("#donut path").forEach(el=>{
      el.addEventListener("mousemove", ev=> showTip(`${el.dataset.f} <b>${num(el.dataset.v)}</b>개 · ${Math.round(el.dataset.v/activeTotal*100)}%`, ev.clientX, ev.clientY));
      el.addEventListener("mouseleave", hideTip);
    });
  },0);
}

renderAll();
</script>
</body>
</html>
